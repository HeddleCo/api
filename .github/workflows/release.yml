name: Release

on:
  push:
    tags:
      - v0.*.*
      - v0.*.*-rc.*

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0
          github_token: ${{ github.token }}
      - uses: arduino/setup-protoc@v3
        with:
          version: "31.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - run: python -m pip install --requirement requirements-test.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@heddleco'
          cache: npm
      - run: ./tools/verify.sh
      - name: Build release artifacts twice
        run: |
          rm -rf release-a release-b release
          mkdir release-a release-b release
          buf build -o release-a/heddle-api.binpb
          npm run build
          npm pack --workspace @heddleco/api --pack-destination release-a
          cargo package
          cp target/package/heddle-api-*.crate release-a/
          find proto -type f -print0 | sort -z | xargs -0 sha256sum > release-a/proto.sha256
          rm -rf build packages/typescript/dist target/package
          buf build -o release-b/heddle-api.binpb
          npm run build
          npm pack --workspace @heddleco/api --pack-destination release-b
          cargo package
          cp target/package/heddle-api-*.crate release-b/
          find proto -type f -print0 | sort -z | xargs -0 sha256sum > release-b/proto.sha256
          (cd release-a && sha256sum *) > /tmp/a.sha256
          (cd release-b && sha256sum *) > /tmp/b.sha256
          diff -u /tmp/a.sha256 /tmp/b.sha256
          cp release-a/* release/
          (cd release && sha256sum *) > release/SHA256SUMS
      - name: Publish Rust crate
        # The env var name (CARGO_REGISTRY_TOKEN) is cargo's documented input; the
        # repo secret label (CRATES_IO_API_KEY) matches the HeddleCo convention used
        # by heddle/sley — set it under repo Settings → Secrets and variables → Actions.
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN is empty — the CRATES_IO_API_KEY secret is unset in HeddleCo/api. Add it (the same crates.io token heddle/sley use), then re-run this release."
            exit 1
          fi
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_KEY }}
      - name: Publish TypeScript package to GitHub Packages
        run: npm publish --workspace @heddleco/api
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          files: release/*
