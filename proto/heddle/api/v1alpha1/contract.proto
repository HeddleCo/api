syntax = "proto3";

package heddle.api.v1alpha1;

import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";

// Bearer proof-of-possession fields shared by every transport adapter. The
// signature covers the bearer capability, timestamp, method,
// method path, and nonce according to the shared signing fixture.
message BearerProof {
  int64 timestamp_seconds = 1;
  bytes nonce = 2;
  bytes signature = 3;
}

// Signature over the canonical request bytes. `algorithm` is `ed25519` for a
// device proof and `webauthn` when `human_verification` is also populated.
message RequestProof {
  string algorithm = 1;
  string signing_identity = 2;
  int64 timestamp_millis = 3;
  bytes nonce = 4;
  bytes signature = 5;
}

// WebAuthn assertion fields for descriptor-declared human verification.
message HumanVerification {
  bytes client_data_json = 1;
  bytes authenticator_data = 2;
  bytes user_handle = 3;
}

// Typed failure detail returned when a human-tier call needs an interactive
// WebAuthn assertion. The challenge remains client-derived from the canonical
// request bytes; `action_url` is only an optional UI handoff hint.
message HumanVerificationChallenge {
  string action_url = 1;
}

// W3C trace context propagated without depending on a transport library.
message TraceContext {
  string traceparent = 1;
  string tracestate = 2;
  string baggage = 3;
}

// Context shared by every hosted call. The method path and encoded request
// body stay in the operation-stream envelope because both are inputs to
// routing and canonical request signing.
message CallContext {
  google.protobuf.Timestamp deadline = 1;
  bytes bearer_capability = 2;
  BearerProof bearer_proof = 3;
  RequestProof request_proof = 4;
  HumanVerification human_verification = 5;
  string client_operation_id = 6;
  TraceContext trace = 7;
  // Optional signed grant envelope paired with a client-minted Biscuit.
  // Kept opaque so the public contract does not own Weft's authorization
  // implementation, while still carrying the complete bearer capability.
  bytes bearer_grant_envelope = 8;
}

enum DeploymentTarget {
  DEPLOYMENT_TARGET_UNSPECIFIED = 0;
  DEPLOYMENT_TARGET_WEFT = 1;
  DEPLOYMENT_TARGET_HEDDLE_DAEMON = 2;
}

enum ServiceMaturity {
  SERVICE_MATURITY_UNSPECIFIED = 0;
  SERVICE_MATURITY_SHIPPED = 1;
  SERVICE_MATURITY_PLANNED = 2;
}

enum StableSigningIdentity {
  STABLE_SIGNING_IDENTITY_UNSPECIFIED = 0;
  STABLE_SIGNING_IDENTITY_NONE = 1;
  STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL = 2;
}

enum SigningTier {
  SIGNING_TIER_UNSPECIFIED = 0;
  SIGNING_TIER_NONE = 1;
  SIGNING_TIER_PROOF_OF_POSSESSION = 2;
  SIGNING_TIER_HUMAN_VERIFICATION = 3;
  SIGNING_TIER_STREAMING_PROOF_OF_POSSESSION = 4;
}

enum RpcEffect {
  RPC_EFFECT_UNSPECIFIED = 0;
  RPC_EFFECT_READ_ONLY = 1;
  RPC_EFFECT_TRANSIENT_WRITE = 2;
  RPC_EFFECT_DURABLE_WRITE = 3;
}

enum RetryBehavior {
  RETRY_BEHAVIOR_UNSPECIFIED = 0;
  RETRY_BEHAVIOR_NEVER = 1;
  RETRY_BEHAVIOR_SAFE = 2;
  RETRY_BEHAVIOR_CLIENT_OPERATION_ID = 3;
  RETRY_BEHAVIOR_RESUMABLE_STREAM = 4;
}

enum CapabilityArea {
  CAPABILITY_AREA_UNSPECIFIED = 0;
  CAPABILITY_AREA_RUN_HISTORY_DETAILS = 1;
  CAPABILITY_AREA_STATE_COMPARISON = 2;
  CAPABILITY_AREA_BRANCH_PROTECTION = 3;
  CAPABILITY_AREA_WORKSPACE_MANAGEMENT = 4;
  CAPABILITY_AREA_REVIEW_DECISIONS = 5;
  CAPABILITY_AREA_SYNCHRONIZATION = 6;
  CAPABILITY_AREA_SPOOL_ADMINISTRATION = 7;
  CAPABILITY_AREA_REPOSITORY_INSPECTION = 8;
  CAPABILITY_AREA_IDENTITY_AND_CREDENTIALS = 9;
  CAPABILITY_AREA_COLLABORATION = 10;
  CAPABILITY_AREA_ATTENTION_FEED = 11;
  CAPABILITY_AREA_PULL_REQUEST_REVIEW = 12;
  CAPABILITY_AREA_SEARCH = 13;
  CAPABILITY_AREA_ASYNCHRONOUS_OPERATIONS = 14;
}

// Authorization is declarative contract metadata. Producers still own runtime
// enforcement; signing identity and signing tier remain independent fields.
enum AuthorizationAccess {
  AUTHORIZATION_ACCESS_UNSPECIFIED = 0;
  // No established user account is required. A producer may still mint an
  // anonymous transport principal for abuse controls or ownership binding.
  AUTHORIZATION_ACCESS_PUBLIC = 1;
  AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL = 2;
  // The service is planned, but its authorization policy has not been
  // decided. This value is invalid for shipped services.
  AUTHORIZATION_ACCESS_PLANNED_UNDECIDED = 3;
}

enum AuthorizationRole {
  AUTHORIZATION_ROLE_UNSPECIFIED = 0;
  AUTHORIZATION_ROLE_NONE = 1;
  AUTHORIZATION_ROLE_CALLER_BOUND = 2;
  AUTHORIZATION_ROLE_RESOURCE_READER = 3;
  AUTHORIZATION_ROLE_RESOURCE_WRITER = 4;
  AUTHORIZATION_ROLE_RESOURCE_ADMINISTRATOR = 5;
  AUTHORIZATION_ROLE_CALLER_OR_RESOURCE_ADMINISTRATOR = 6;
  AUTHORIZATION_ROLE_GLOBAL_ADMINISTRATOR = 7;
  // The service is planned, but its authorization policy has not been
  // decided. This value is invalid for shipped services.
  AUTHORIZATION_ROLE_PLANNED_UNDECIDED = 8;
  // Resource roles preserve Weft's hosted-role guard vocabulary. These values
  // are appended so existing enum numbers remain wire-compatible.
  AUTHORIZATION_ROLE_RESOURCE_MAINTAINER = 9;
  AUTHORIZATION_ROLE_RESOURCE_OWNER = 10;
}

enum AuthorizationScopeSource {
  AUTHORIZATION_SCOPE_SOURCE_UNSPECIFIED = 0;
  AUTHORIZATION_SCOPE_SOURCE_NONE = 1;
  AUTHORIZATION_SCOPE_SOURCE_CALLER_SUBJECT = 2;
  AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY = 3;
  AUTHORIZATION_SCOPE_SOURCE_REQUEST_NAMESPACE = 4;
  AUTHORIZATION_SCOPE_SOURCE_REQUEST_RESOURCE = 5;
  AUTHORIZATION_SCOPE_SOURCE_CALLER_GRANTS = 6;
  // The service is planned, but its authorization policy has not been
  // decided. This value is invalid for shipped services.
  AUTHORIZATION_SCOPE_SOURCE_PLANNED_UNDECIDED = 7;
}

enum AuthorizationExistence {
  AUTHORIZATION_EXISTENCE_UNSPECIFIED = 0;
  AUTHORIZATION_EXISTENCE_DISCLOSE = 1;
  AUTHORIZATION_EXISTENCE_HIDE = 2;
  // The service is planned, but its authorization policy has not been
  // decided. This value is invalid for shipped services.
  AUTHORIZATION_EXISTENCE_PLANNED_UNDECIDED = 3;
}

message ServiceContract {
  repeated DeploymentTarget deployment_targets = 1;
  ServiceMaturity maturity = 2;
}

message AuthorizationRequestTarget {
  // A protobuf field path in the request, using proto field names separated
  // by dots.
  string path = 1;
  // The role required for the resource selected by `path`.
  AuthorizationRole role = 2;
}

message RpcContract {
  StableSigningIdentity signing_identity = 1;
  SigningTier signing_tier = 2;
  RpcEffect effect = 3;
  RetryBehavior retry_behavior = 4;
  bool client_operation_id_required = 5;
  CapabilityArea capability = 6;
  AuthorizationAccess authorization_access = 7;
  AuthorizationRole authorization_role = 8;
  AuthorizationScopeSource authorization_scope_source = 9;
  AuthorizationExistence authorization_existence = 10;
  // Every request field that selects an authorization guard target and the
  // role required for that target. Every populated selector is guarded;
  // request-derived scope sources require at least one target, while
  // non-request scope sources prohibit targets.
  repeated AuthorizationRequestTarget authorization_request_targets = 11;
  // True when the authorization rule deliberately has multiple request
  // targets. Audits reject a mismatch so a multi-resource rule cannot
  // silently collapse to one selector.
  bool authorization_multi_target = 12;
  // Optional per-method deployment override. Empty inherits the service contract.
  repeated DeploymentTarget deployment_targets = 13;
  // Optional per-method maturity override. UNSPECIFIED inherits the service contract.
  ServiceMaturity maturity = 14;
}

// Machine-readable lifecycle semantics for the canonical Operation state enum.
// `error_required` is valid only for terminal failure, and
// `cancellation_succeeded` is valid only for terminal cancellation.
message OperationStateContract {
  bool terminal = 1;
  bool error_required = 2;
  bool cancellation_succeeded = 3;
}

extend google.protobuf.ServiceOptions {
  ServiceContract service_contract = 50001;
}

extend google.protobuf.MethodOptions {
  RpcContract rpc_contract = 50002;
}

extend google.protobuf.EnumValueOptions {
  OperationStateContract operation_state_contract = 50003;
}
