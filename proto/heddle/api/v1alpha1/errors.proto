syntax = "proto3";

package heddle.api.v1alpha1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Stable call outcome vocabulary independent of QUIC or any other concrete
// transport implementation.
enum CallFailureCode {
  CALL_FAILURE_CODE_UNSPECIFIED = 0;
  CALL_FAILURE_CODE_CANCELLED = 1;
  CALL_FAILURE_CODE_UNKNOWN = 2;
  CALL_FAILURE_CODE_INVALID_ARGUMENT = 3;
  CALL_FAILURE_CODE_DEADLINE_EXCEEDED = 4;
  CALL_FAILURE_CODE_NOT_FOUND = 5;
  CALL_FAILURE_CODE_ALREADY_EXISTS = 6;
  CALL_FAILURE_CODE_PERMISSION_DENIED = 7;
  CALL_FAILURE_CODE_RESOURCE_EXHAUSTED = 8;
  CALL_FAILURE_CODE_FAILED_PRECONDITION = 9;
  CALL_FAILURE_CODE_ABORTED = 10;
  CALL_FAILURE_CODE_OUT_OF_RANGE = 11;
  CALL_FAILURE_CODE_UNIMPLEMENTED = 12;
  CALL_FAILURE_CODE_INTERNAL = 13;
  CALL_FAILURE_CODE_UNAVAILABLE = 14;
  CALL_FAILURE_CODE_DATA_LOSS = 15;
  CALL_FAILURE_CODE_UNAUTHENTICATED = 16;
}

enum ErrorReason {
  ERROR_REASON_UNSPECIFIED = 0;

  // Authentication (1xx)
  ERROR_REASON_CREDENTIAL_MISSING = 100;
  ERROR_REASON_CREDENTIAL_EXPIRED = 101;
  ERROR_REASON_CREDENTIAL_REVOKED = 102;
  ERROR_REASON_PROOF_INVALID = 103;

  // Authorization (2xx)
  ERROR_REASON_SCOPE_MISSING = 200;
  ERROR_REASON_ROLE_INSUFFICIENT = 201;
  ERROR_REASON_POLICY_DENIED = 202;
  ERROR_REASON_PLAN_LIMIT = 203;

  // Existence (3xx)
  ERROR_REASON_RESOURCE_NOT_FOUND = 300;
  ERROR_REASON_RESOURCE_GONE = 301;

  // Request validity (4xx)
  ERROR_REASON_FIELD_INVALID = 400;
  ERROR_REASON_FIELD_REQUIRED = 401;

  // Preconditions & conflicts (5xx)
  ERROR_REASON_LIFECYCLE_STATE = 500;
  ERROR_REASON_OPERATION_ID_REUSED = 501;
  ERROR_REASON_VERSION_CONFLICT = 502;
  ERROR_REASON_ALREADY_EXISTS = 503;

  // Flow control (6xx) — retryable
  ERROR_REASON_RATE_LIMITED = 600;
  ERROR_REASON_QUOTA_EXCEEDED = 601;
  ERROR_REASON_CURSOR_INVALID = 602;

  // Server (9xx)
  ERROR_REASON_TRANSIENT = 900;
  ERROR_REASON_INTERNAL = 901;
  ERROR_REASON_UNIMPLEMENTED = 902;
}

message CallFailure {
  CallFailureCode code = 1;
  string message = 2;
  reserved 3;
  reserved "details";
  ErrorDetail error = 4;
}

message RetryAdvice {
  google.protobuf.Duration retry_after = 1;
}

message ConflictDetail {
  string resource = 1;
  string expected_version = 2;
  string actual_version = 3;
}

message CursorFailure {
  enum Reason {
    REASON_UNSPECIFIED = 0;
    REASON_STALE = 1;
    REASON_EXPIRED = 2;
  }
  Reason reason = 1;
  google.protobuf.Timestamp expired_at = 2;
  string restart_cursor = 3;
}

message CapabilityRequirement {
  repeated string capabilities = 1;
}

message PolicyDenial {
  string policy_id = 1;
  string rule = 2;
  bool human_verification_can_override = 3;
}

message ErrorDetail {
  ErrorReason reason = 1;
  // Canonical path/id the failure is about; empty if none.
  string resource = 2;
  // Request proto field path, for validation failures.
  string field = 3;
  oneof context {
    RetryAdvice retry = 10;
    ConflictDetail conflict = 11;
    CursorFailure cursor = 12;
    CapabilityRequirement capability = 13;
    PolicyDenial policy = 14;
  }
}

message StreamFailure {
  CallFailureCode code = 1;
  string message = 2;
  reserved 3, 4;
  reserved "retry", "cursor";
  ErrorDetail error = 5;
}
