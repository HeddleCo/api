    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_PROOF_OF_POSSESSION
      effect: RPC_EFFECT_TRANSIENT_WRITE
      retry_behavior: RETRY_BEHAVIOR_CLIENT_OPERATION_ID
      client_operation_id_required: false
      capability: CAPABILITY_AREA_IDENTITY_AND_CREDENTIALS
      authorization_access: AUTHORIZATION_ACCESS_PUBLIC
      authorization_role: AUTHORIZATION_ROLE_NONE
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_NONE
      authorization_existence: AUTHORIZATION_EXISTENCE_DISCLOSE
    };
