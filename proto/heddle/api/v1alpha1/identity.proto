syntax = "proto3";

package heddle.api.v1alpha1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "heddle/api/v1alpha1/contract.proto";
import "heddle/api/v1alpha1/types.proto";

message BeginWebAuthnRegistrationRequest {
  string username = 1;
  string display_name = 2;
}

message RegisterPublicKeyRequest {
  string challenge_id = 1;
  // Raw bytes per WebAuthn (clientDataJSON / attestationObject / authenticatorData
  // / signature are passed verbatim; the WebAuthn lib base64url-decodes them
  // off the wire).
  bytes client_data_json = 2;
  bytes attestation_object = 3;
  string device_label = 4;
  // Raw 32-byte Ed25519 public key the client commits to as the
  // renewal anchor for this device. Distinct from the WebAuthn
  // credential's attested public key (COSE-encoded, lives in
  // `webauthn_credentials`): this key lives in `device_roots` and
  // is the one `mint_biscuit_keypair` calls
  // `Ed25519Signer::verify_with_public_key` against on every
  // `KeypairProof` renewal. Leave empty for browser-only flows.
  //
  // When non-empty, MUST be accompanied by a binding signature
  // (see the three `device_binding_*` fields). Closes
  // HeddleCo/weft#131.
  bytes device_public_key = 5;
  string client_operation_id = 6;
  // === Device-key binding proof (HeddleCo/weft#131) ===
  // Required iff `device_public_key` is non-empty. Together these
  // carry a WebAuthn assertion (`navigator.credentials.get()`
  // produced immediately after `create()` succeeds, signed by the
  // same authenticator) whose challenge is
  //   base64url(SHA256("heddle-device-binding-v1" || 0x00 || device_public_key))
  // The server verifies the assertion's signature using the COSE
  // public key extracted from the attestation, then persists
  // `device_public_key` as the device root. Binds the two keys
  // cryptographically: the renewal-path public key is only
  // accepted if the WebAuthn credential signs it.
  bytes device_binding_client_data_json = 7;
  bytes device_binding_authenticator_data = 8;
  bytes device_binding_signature = 9;
  // === Cross-device enrollment attestation (HeddleCo/weft#119) ===
  // Set when this registration is being attested by an already-enrolled
  // device (the OAuth-style localhost-loopback flow), rather than by a
  // fresh WebAuthn `create()` on this device. Both fields are required
  // together; both empty for the ordinary first-device / browser-only flow.
  //
  // `attesting_pubkey` is the raw Ed25519 public key of the existing,
  // already-enrolled device that signed the attestation. The server
  // verifies it chains to a known, non-revoked pubkey for the same
  // identity and rejects unknown/revoked attesters.
  //
  // `cross_device_attestation` is the signature, produced by the key in
  // `attesting_pubkey`, over the enrollment statement
  // `enroll(new_pubkey, scope, expiry, nonce)`. The server enforces the
  // bounded `scope` (read-only vs full), the `expiry` (max 7d on the
  // attestation itself), and one-shot `nonce` (rejects replays). The
  // resulting enrollment of `device_public_key` is permanent until
  // revoked.
  bytes attesting_pubkey = 10;
  bytes cross_device_attestation = 11;
}

message BeginWebAuthnAuthenticationRequest {
  string username = 1;
}

message FinishWebAuthnAuthenticationRequest {
  string challenge_id = 1;
  string credential_id = 2;
  bytes client_data_json = 3;
  bytes authenticator_data = 4;
  bytes signature = 5;
  bytes user_handle = 6;
  // Client-side device pubkey the client wants the access token bound
  // to. Server validates this against the user's active device_roots.
  bytes device_public_key = 7;
  string client_operation_id = 8;
}

message CreateDeviceAuthorizationRequest {
  string device_name = 1;
  bytes device_public_key = 2;
  string scope = 3;
  string client_operation_id = 4;
}

message ApproveDeviceAuthorizationRequest {
  string user_code = 1;
  string provider = 2;
  string model = 3;
  bool default_agent_policy = 4;
  string client_operation_id = 5;
}

message ExchangeDeviceAuthorizationRequest {
  string device_code = 1;
  bytes device_public_key = 2;
  // Raw signature bytes over `device:{device_code}` using the device key.
  bytes proof = 3;
}

message WaitForDeviceAuthorizationRequest {
  string device_code = 1;
}

message DeviceAuthorizationEvent {
  string status = 1;
}

message RotateCredentialRequest {
  string credential_id = 1;
  bytes public_key = 2;
  string client_operation_id = 3;
}

message RevokeCredentialRequest {
  string credential_id = 1;
  string reason = 2;
  string client_operation_id = 3;
}

message RevokeCredentialResponse {
  bool revoked = 1;
}

message CreateServiceAccountRequest {
  string subject = 1;
  string display_name = 2;
  string scope = 3;
  string client_operation_id = 4;
}

message IssueServiceAccountCredentialRequest {
  string service_account_id = 1;
  bytes public_key = 2;
  string scope = 3;
  // 0 = never expires. Otherwise the credential Biscuit's expiry and
  // the `issued_credentials.expires_at` row are both set to now + ttl_secs.
  google.protobuf.Duration ttl_secs = 4;
  string client_operation_id = 5;
  // Proof made by the service account's currently registered key over the
  // issuance challenge. These were gRPC metadata before the Iroh cutover;
  // keeping them in the request makes retries and signatures transport-neutral.
  int64 proof_timestamp_seconds = 6;
  bytes proof_signature = 7;
}

message AuthChallengeResponse {
  string challenge_id = 1;
  string challenge = 2;
  google.protobuf.Timestamp expires_at = 3;
  string username = 4;
  string rp_id = 5;
  string rp_name = 6;
  string user_id = 7;
  string display_name = 8;
  repeated string allow_credential_ids = 9;
  string attestation = 10;
  string user_verification = 11;
}

message DeviceAuthorizationResponse {
  string device_code = 1;
  string user_code = 2;
  string verification_uri = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message AccessTokenResponse {
  // The Biscuit (base64url-encoded). Goes in the `heddle_session`
  // cookie for browser flows and in the CLI credentials store for
  // device-bound flows.
  string token = 1;
  string subject = 2;
  // Unix-seconds expiry. The Biscuit also carries this internally,
  // but exposing it explicitly lets clients know when to renew
  // without parsing the token.
  google.protobuf.Timestamp expires_at = 3;
  // The Biscuit's `session()` fact (also its revocation id). Stable
  // public id surfaced in the Active Sessions UI; argument to
  // `RevokeSession`.
  string session_id = 4;
  repeated string amr = 5;
  // `issued_credentials.id` for tokens minted from a long-lived
  // credential row (device, service-account, agent). Empty for
  // browser sessions.
  string credential_id = 6;
  // Server-issued GrantEnvelope authenticating the client's pubkey +
  // session for biscuit minting. Empty on legacy / unauthenticated
  // responses.
  bytes grant_envelope = 7;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated ActiveSession sessions = 1;
}

message ActiveSession {
  // Public id of the refresh token (matches `auth_refresh_tokens.id`).
  // Used by RevokeSession to identify which row to revoke.
  string id = 1;
  // True for the session this RPC was invoked on, so the UI can
  // mark it "Current" and disable the revoke button (revoking
  // yourself is just logout — the dedicated logout flow handles
  // cookie cleanup correctly).
  bool is_current = 2;
  // Captured at issue time. Surfaced in the device list as a
  // human-readable string ("Chrome on macOS", "Safari on iPhone").
  // The web layer parses to that shape for display; the raw UA
  // header is what's stored.
  string user_agent = 3;
  // Captured at issue time. Empty string when unknown.
  string ip = 4;
  google.protobuf.Timestamp issued_at = 5;
  google.protobuf.Timestamp expires_at = 6;
  // Last time this token was rotated (i.e. the user actively used
  // the app from this session). Zero when never rotated.
  google.protobuf.Timestamp last_used_at = 7;
}

message RevokeSessionRequest {
  // The session id to revoke (from ActiveSession.id).
  string session_id = 1;
  string client_operation_id = 2;
}

// Caller authenticates with their normal session bearer in `CallContext`
// (the same path as every other hosted call). No body fields — the response is purely a function of the
// caller's identity and a fixed 5-minute TTL.
message IssuePresenceTokenRequest {
  string client_operation_id = 1;
}

message IssuePresenceTokenResponse {
  // base64-encoded narrow Biscuit. Embed in the WS upgrade URL as
  // `?token=<this>`. Disposable on the caller's side after the WS
  // connection is established.
  string token = 1;

  // Unix-seconds wall-clock expiry. Always 5 minutes from issue.
  // Surfacing it lets the client know when to re-mint without
  // parsing the token.
  google.protobuf.Timestamp expires_at = 2;
}

// MintBiscuit is the unified renewal endpoint for long-lived
// processes. The caller proves they're entitled to a fresh Biscuit
// via one of the proof variants below. See `AuthService.MintBiscuit`
// for the full semantic note.
message MintBiscuitRequest {
  // The principal subject that the new Biscuit should bind to. Must
  // match the keypair's recorded subject (or the device_root's
  // user). Server rejects mismatches as `permission_denied` rather
  // than minting a token for an arbitrary subject.
  string subject = 1;

  // Attenuation hint: when set, the server intersects the requested
  // scope with the keypair-owner's original grant. Empty == reuse
  // the original scope.
  string requested_scope = 2;

  // UA / IP captured by the caller. Same shape and intent as
  // `RefreshSessionRequest` had — usually empty (the web layer's
  // `x-forwarded-*` metadata path is preferred), but kept available
  // for direct CLI callers that don't speak the proxy convention.
  string user_agent = 3;
  string ip = 4;

  oneof proof {
    KeypairProof keypair = 5;
    DeviceAuthProof device_auth = 6;
    // OidcProof oidc = 12;  // Future: federated CI token exchange.
  }

  string client_operation_id = 7;
}

// Proof of possession via Ed25519 signature. The server looks up
// `public_key_id` in `device_roots` first (CLI device flow) and then
// in `issued_credentials` (service-account credential renewal). The
// signature is over the canonical bytes
// `f"{timestamp}\n{public_key_id}\n{requested_scope}"` (UTF-8). The
// timestamp window is ±60s — replay attempts older than that are
// rejected without touching the keypair lookup.
message KeypairProof {
  // Stable id of the public key. Matches `device_roots.id` or
  // `issued_credentials.id`.
  string public_key_id = 1;
  // Unix-seconds when the signature was produced. Signed input.
  uint64 timestamp = 2;
  // Ed25519 signature over the canonical bytes.
  bytes signature = 3;
}

// Proof that a user-approved device authorization completed. The
// CLI presents the device_code returned by
// `CreateDeviceAuthorization` plus a signature over `device:{code}`
// using the device keypair generated locally. Server completes the
// hand-off: registers the device_root row if not present, mints a
// fresh Biscuit bound to the device pop key.
message DeviceAuthProof {
  string device_code = 1;
  // Raw Ed25519 public-key bytes. Server stores it on first hand-off
  // (`device_roots` row) and signs subsequent renewals against it via
  // `KeypairProof`.
  bytes device_public_key = 2;
  // Signature over the bytes `device:{device_code}` using the
  // device's private key. Replaces the old proof field on
  // `ExchangeDeviceAuthorizationRequest`.
  bytes signature = 3;
}

// Mint a fresh anonymous Biscuit. Unauthenticated; per-IP
// rate-limited server-side (see `docs/auth/anon-biscuit-spike.md`
// §7.1: 10/hour/IP). When `WEFT_MINT_TURNSTILE_REQUIRED=true` on
// the server, `turnstile_token` MUST be a valid Cloudflare
// Turnstile token; otherwise the field is ignored. See
// HeddleCo/weft#189 and HeddleCo/weft#192.
message MintAnonBiscuitRequest {
  // Cloudflare Turnstile token captured by the caller's frontend.
  // Required when the server has `WEFT_MINT_TURNSTILE_REQUIRED=true`
  // (operator-flippable break-glass under coordinated abuse). Empty
  // / omitted when the flag is off.
  optional string turnstile_token = 1;
  // Opaque long-lived continuity token from the browser's HttpOnly
  // anon-continuity cookie. When present and valid, the server mints
  // the new 24h anon biscuit for the same Anon(uuid) and rotates the
  // continuity token. When absent or invalid, the server creates a
  // fresh anon profile instead.
  string anon_continuity_token = 2;
  string client_operation_id = 3;
}

message MintAnonBiscuitResponse {
  // Raw biscuit bytes carrying `subject_kind("anon")` + a fresh
  // `Anon(uuid)` subject. The caller (tapestry's worker) base64-
  // encodes these for the `weft_auth` cookie value. See
  // `docs/auth/anon-biscuit-spike.md` §3.3 for the cookie shape.
  bytes biscuit = 1;
  // Hard expiry the biscuit was minted with. Same value as the
  // biscuit's internal `expires_at` fact; surfaced so callers can
  // set `Max-Age` on the cookie without parsing the token.
  google.protobuf.Timestamp expires_at = 2;
  // New opaque continuity token for the browser to store separately
  // from the short-lived biscuit. It is not a bearer for normal RPCs;
  // it can only be redeemed at MintAnonBiscuit to recover the same
  // Anon(uuid) after the biscuit cookie expires.
  string anon_continuity_token = 3;
  // Expiry for `anon_continuity_token`.
  google.protobuf.Timestamp continuity_expires_at = 4;
  // Debug/audit surface for the anon profile id the biscuit carries.
  // UI does not need to show this.
  string anon_id = 5;
}

message IssuedCredentialResponse {
  string credential_id = 1;
  string token = 2;
  google.protobuf.Timestamp expires_at = 3;
  string subject = 4;
  optional string provider = 5;
  optional string model = 6;
  optional string device_id = 7;
}

message WhoAmIRequest {}

message WhoAmIResponse {
  string subject = 1;
  // True when the bearer carries the operator (staff) marker. This is the
  // Heddle-internal "operator" capability used to gate the intake page,
  // email-template editor, and the global ListActors/ListWorktrees views.
  // Distinct from the namespace-level `Role::Admin` grant that customers
  // hold on their own resources.
  bool is_staff = 2;
  bool is_biscuit = 3;
  string session_id = 4;
  repeated string amr = 5;
  string scope = 6;
  string credential_id = 7;
  optional string device_id = 8;
  optional string agent_provider = 9;
  optional string agent_model = 10;
  string actor_subject = 11;
  bool is_service_account = 12;
  // Resource grants the caller holds directly. Does NOT include inherited
  // roles — those are resolved server-side when enforcing per-RPC checks.
  // Web clients may use `roles` for UI gating but MUST NOT rely on it for
  // authorization decisions.
  repeated ResourceRole roles = 13;
  // Account-level billing entitlement for the caller's subject. Surfaced for
  // UX affordances only — servers enforce the effective plan on the gated
  // RPCs, never the client. Absent (default) ⇒ treat as the free plan.
  Entitlement entitlement = 14;
}

// A single role grant held by the caller on a namespace or repository.
message ResourceRole {
  // Visible resource path, e.g. "heddle/core-services" or "heddle".
  string resource_path = 1;
  // "namespace" or "repository".
  string resource_kind = 2;
  // Role name: one of "reader", "developer", "maintainer", "admin", "owner".
  HostedRole role = 3;
}

// Billing plan tier. `product_id → plan` is mapped server-side by weft from
// checked-in, fail-closed config; clients never assert a Plan on writes.
enum Plan {
  PLAN_UNSPECIFIED = 0;
  PLAN_FREE = 1;
  PLAN_BASIC = 2;
  PLAN_PRO = 3;
  PLAN_ORG = 4;
}

// Subscription lifecycle state, mirroring the provider's authoritative state.
enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  PAST_DUE = 2;
  CANCELED = 3;
  INCOMPLETE = 4;
}

// The account-level entitlement applied for a subject.
message Entitlement {
  Plan plan = 1;
  SubscriptionStatus status = 2;
  google.protobuf.Timestamp current_period_end = 3;
}

// Records/updates a subject's paid entitlement. A privilege-granting write —
// weft gates it on the billing service account's `billing:write` Right and
// maps `product_id → plan` from checked-in, fail-closed config.
message RecordSubscriptionRequest {
  string subject = 1;
  string product_id = 2;
  SubscriptionStatus status = 3;
  string provider = 4;
  string provider_customer_id = 5;
  string provider_subscription_id = 6;
  google.protobuf.Timestamp current_period_end = 7;
  // Provider webhook event id — the natural idempotency key for the upstream
  // billing event. Retained for handler-side dedup alongside the transport
  // `client_operation_id`.
  string event_id = 8;
  string client_operation_id = 9;
}

message RecordSubscriptionResponse {
  Entitlement entitlement = 1;
}

message IntrospectCredentialRequest {
  string credential_id = 1;
}

message CredentialInfo {
  string credential_id = 1;
  string subject = 2;
  string kind = 3;
  string scope = 4;
  // Epoch seconds. 0 = never expires.
  google.protobuf.Timestamp expires_at = 5;
  bool revoked = 6;
  optional string device_id = 7;
  optional string provider = 8;
  optional string model = 9;
  // Epoch seconds, always populated.
  google.protobuf.Timestamp created_at = 10;
  // Epoch seconds. 0 = never used. Touched on every successful Biscuit validation.
  google.protobuf.Timestamp last_used_at = 11;
}

message ServiceAccountResponse {
  string service_account_id = 1;
  string subject = 2;
  string display_name = 3;
  string scope = 4;
}

message RevokeServiceAccountRequest {
  string service_account_id = 1;
  string client_operation_id = 2;
}

message ListServiceAccountsRequest {}

message ListServiceAccountsResponse {
  repeated ServiceAccountWithCredentials service_accounts = 1;
}

message ServiceAccountWithCredentials {
  string service_account_id = 1;
  string subject = 2;
  string display_name = 3;
  string scope = 4;
  repeated CredentialInfo credentials = 5;
  bool revoked = 6;
  // Epoch seconds, always populated.
  google.protobuf.Timestamp created_at = 7;
  // Username of the human who created this service account. Empty when
  // the creator's user row has been deleted (ON DELETE SET NULL).
  string created_by_subject = 8;
}

message ListScopeCapabilitiesRequest {}

message ListScopeCapabilitiesResponse {
  repeated ScopeCapability capabilities = 1;
}

message ScopeCapability {
  // Canonical scope token, e.g. "repo:write", "agent:spawn".
  string name = 1;
  // Short human-readable description for the UI reference grid.
  string description = 2;
  // Coarse category for UI grouping: "repo", "thread", "agent", "grant",
  // "namespace", "presence", "admin".
  string category = 3;
}

// ── OAuth identity linking ──────────────────────────────────────────────────

message LinkOAuthIdentityRequest {
  // Which OAuth provider this proof is from. Used by the server to
  // pick the correct ID-token verifier (JWKS for Google/Apple,
  // /user + /user/emails API path for GitHub).
  string provider = 1; // "google" | "apple" | "github"

  // The provider's cryptographic proof of identity.
  //   - Google / Apple: OIDC `id_token` (provider-signed JWT).
  //   - GitHub: OAuth2 access token (server validates via /user +
  //     /user/emails).
  //
  // Server validates this proof and extracts
  // `(sub, email, email_verified)` from the verified result; the
  // request itself carries NO user-identity claims the caller can
  // forge. Closes the OAuth-link forge bypass surfaced on
  // HeddleCo/weft#193 r2 (Codex cid 3294026240); design rationale
  // in the HeddleCo/weft#195 spike amendment.
  oneof oauth_proof {
    string id_token = 2;
    string access_token = 3;
  }

  // OPTIONAL: a fresh WebAuthn assertion proving ownership of the
  // existing user account that this OAuth identity is being
  // attached to. Required only when the OAuth-validated email
  // collides with an existing user (per the email-collision passkey
  // gate, weft spike §4.6); otherwise empty.
  optional bytes webauthn_assertion = 4;
  string client_operation_id = 5;
}

message StoreProviderTokenRequest {
  string provider = 1;
  string access_token = 2;
  string refresh_token = 3;
  string token_scope = 4;
  google.protobuf.Timestamp expires_at = 5;
  string client_operation_id = 6;
}

message StoreProviderTokenResponse {}

// ── Signup-email verification ───────────────────────────────────────────────

message VerifySignupEmailRequest {
  // The single-use token emailed to the signup address (opaque to
  // clients — the server validates this against the pending
  // signup_email_verification challenge row).
  string verification_token = 1;
  string client_operation_id = 2;
}

message VerifySignupEmailResponse {
  // Opaque bootstrap-scope Biscuit the client presents on the
  // subsequent `BeginWebAuthnRegistration` call. Empty on rejection
  // (the RPC returns a non-OK status in that case; this field is
  // populated only on success). Carrying the token as raw bytes lets
  // future fields (expiry, refresh window) extend the response
  // additively without breaking the wire format.
  bytes bootstrap_token = 1;
}

// ── External diff analysis (for PR review packets) ──────────────────────────

// Public invitation-summary lookup. Never throws — unknown/malformed
// ids return `exists: false, valid: false`.
message GetInvitationSummaryRequest {
  string id = 1;
}

message InvitationSummary {
  bool exists = 1;
  bool valid = 2; // false if revoked, accepted, or expired
  string namespace_path = 3;
  string namespace_name = 4; // may be empty if metadata has no display name
  HostedRole role = 5;
  // Intentionally NO email or invited_by — don't leak PII.
}

// ── Account recovery (E2 self-sovereign-auth, weft#120 §8) ──────────────────
//
// Declaration phase (weft#182) — the generic dispatcher and per-kind requests
// share one response. The persisted substrate is a `recovery_methods` row keyed
// on `(user_id, kind)` with `kind_data jsonb`, `declared_at`, and `window_secs`.

// Canonical recovery-method kinds. Mirrors the `recovery_methods.kind`
// column. `RECOVERY_METHOD_KIND_UNSPECIFIED` is rejected by the server.
enum RecoveryMethodKind {
  RECOVERY_METHOD_KIND_UNSPECIFIED = 0;
  // Time-locked WebAuthn recovery credential (weft#183).
  RECOVERY_METHOD_KIND_TIME_LOCKED_WEBAUTHN = 1;
  // Social guardians with an M-of-N threshold (weft#185).
  RECOVERY_METHOD_KIND_SOCIAL = 2;
  // Argon2id-hashed paper-code mnemonic (weft#186).
  RECOVERY_METHOD_KIND_PAPER_CODE = 3;
}

// Generic declaration entry point. `kind` selects which `params` variant the
// server reads; the body carries the per-kind material as a oneof arm so a
// caller declares any method through this single endpoint. weft#182.
// Consolidated (owner decision): the former per-kind Declare* RPCs are now
// oneof arms, not standalone RPCs. Retry dedup is carried by the transport
// `client_operation_id` + `rpc_contract.retry_behavior`, replacing the legacy
// per-arm `idempotency_key` option.
message DeclareRecoveryMethodRequest {
  RecoveryMethodKind kind = 1;
  oneof params {
    DeclareHardwareKeyRecoveryParams hardware_key = 2;
    DeclareSocialGuardiansParams social = 3;
    DeclarePaperCodeParams paper_code = 4;
  }
  string client_operation_id = 5;
}

// Shared response for the declaration RPC. `bootstrap_promoted` is true when
// this was the user's first declared method and the server promoted the
// caller's bootstrap-scope Biscuit to full scope (weft#120 §Q2). When a
// promotion occurs, `promoted_token` carries the newly-minted full-scope
// Biscuit; empty otherwise.
message DeclareRecoveryMethodResponse {
  // Stable id of the persisted `recovery_methods` row.
  string method_id = 1;
  RecoveryMethodKind kind = 2;
  google.protobuf.Timestamp declared_at = 3;
  bool bootstrap_promoted = 4;
  string promoted_token = 5;
}

// Register a WebAuthn recovery credential (`kind=time_locked_webauthn`). The
// WebAuthn attestation fields mirror RegisterPublicKeyRequest's first-enroll
// shape — the recovery credential is a distinct authenticator the user
// stashes for the lost-all-devices case. weft#182 §8-2.
message DeclareHardwareKeyRecoveryParams {
  string challenge_id = 1;
  // Raw WebAuthn bytes (verbatim; the lib base64url-decodes off the wire).
  bytes client_data_json = 2;
  bytes attestation_object = 3;
  // Human label for the recovery authenticator ("YubiKey 5C — backup").
  string device_label = 4;
  // Veto window applied to a future BeginRecovery against this credential.
  // Default 7 days; 0 = instant (the user opts out of the veto window).
  google.protobuf.Duration window_secs = 5;
}

// Declare social guardians + an M-of-N threshold (`kind=social`). weft#185.
message DeclareSocialGuardiansParams {
  // The guardian identities the user nominates. Each carries the stable
  // subject plus the guardian's signing pubkey so SubmitRecoveryProof can
  // verify the M-of-N attestation later.
  repeated SocialGuardian guardians = 1;
  // M in "M of N": the number of guardian signatures required to recover.
  // Must satisfy 1 <= threshold <= len(guardians); server rejects otherwise.
  uint32 threshold = 2;
}

// A single nominated guardian.
message SocialGuardian {
  // Stable subject of the guardian's Heddle identity (e.g. "user:…").
  string subject = 1;
  // Raw Ed25519 public key the guardian signs recovery attestations with.
  bytes public_key = 2;
  // Optional human label for the UI ("Alice (sister)").
  string display_name = 3;
}

// Declare a paper-code (mnemonic) recovery method (`kind=paper_code`). The
// plaintext mnemonic is generated client-side and NEVER transmitted — only
// the argon2id verifier, its salt, and the KDF params are sent. The server
// MUST reject any request that carries plaintext mnemonic bytes. weft#186.
message DeclarePaperCodeParams {
  // argon2id(mnemonic, salt, params). Raw hash bytes.
  bytes argon2id_hash = 1;
  // Per-row random salt the client used. Stored so SubmitRecoveryProof can
  // tell the recovering client which salt to hash against.
  bytes salt = 2;
  // KDF params stored alongside the hash so they can be tuned without
  // breaking existing codes. Floor per OWASP: 64 MiB memory, 3 iterations,
  // parallelism 4.
  Argon2idParams params = 3;
}

// argon2id parameters. Stored per paper-code row so the verifier is
// reproducible and the floor can be raised over time.
message Argon2idParams {
  // Memory cost in KiB (OWASP floor: 65536 = 64 MiB).
  uint32 memory_kib = 1;
  // Iteration / time cost (OWASP floor: 3).
  uint32 iterations = 2;
  // Degree of parallelism (OWASP floor: 4).
  uint32 parallelism = 3;
}

// ── Recovery flow (weft#183/#185/#186) ──────────────────────────────────────

// Start a recovery attempt for a username. weft#183 §8-3.
message BeginRecoveryRequest {
  string username = 1;
  // Which declared method the client intends to prove. Lets the server scope
  // the attempt (and the returned window) to the right `recovery_methods`
  // row. Server rejects a kind the user has not declared.
  RecoveryMethodKind kind = 2;
  string client_operation_id = 3;
}

// Salt + KDF params the recovering client uses to argon2id-hash the typed
// mnemonic before SubmitRecoveryProof. Populated on BeginRecovery when
// `kind=paper_code` (declared method material on real attempts; deterministic
// synthetic material on decoy begins for anti-enumeration). weft#186.
message PaperCodeKdfMaterial {
  bytes salt = 1;
  Argon2idParams params = 2;
}

message BeginRecoveryResponse {
  // Stable id of the `recovery_attempts` row. Echoed back on
  // SubmitRecoveryProof / VetoRecovery / CompleteRecovery and named inside
  // the social attestation message to bind signatures to this attempt.
  string recovery_attempt_id = 1;
  // The veto window for this attempt (copied from the declared method's
  // `window_secs`).
  google.protobuf.Duration window_secs = 2;
  // Wall-clock instant at which CompleteRecovery becomes eligible
  // (started_at + window_secs).
  google.protobuf.Timestamp completes_at = 3;
  // Present when BeginRecoveryRequest.kind is paper_code.
  PaperCodeKdfMaterial paper_code_kdf = 4;
}

// Submit proof against the declared method for an in-flight attempt. The
// proof variant must match the attempt's kind. weft#183/#185/#186.
message SubmitRecoveryProofRequest {
  string recovery_attempt_id = 1;
  oneof proof {
    WebAuthnRecoveryProof webauthn = 2;
    SocialRecoveryProof social = 3;
    PaperCodeRecoveryProof paper_code = 4;
  }
  string client_operation_id = 5;
}

// WebAuthn assertion signed by the declared `time_locked_webauthn`
// recovery credential. weft#183.
message WebAuthnRecoveryProof {
  string credential_id = 1;
  bytes client_data_json = 2;
  bytes authenticator_data = 3;
  bytes signature = 4;
  // The fresh device pubkey the recovered identity will be bound to once
  // CompleteRecovery runs the cascade. Raw Ed25519 bytes.
  bytes new_device_public_key = 5;
}

// M-of-N guardian signatures over a recovery attestation. weft#185. Each
// signature is over a canonical message that names `recovery_attempt_id`, so
// the same N signatures cannot be replayed against a different attempt.
message SocialRecoveryProof {
  repeated GuardianSignature signatures = 1;
  // The fresh device pubkey the recovered identity will be bound to. Raw
  // Ed25519 bytes.
  bytes new_device_public_key = 2;
}

message GuardianSignature {
  // Subject of the signing guardian (matches a declared SocialGuardian).
  string guardian_subject = 1;
  // Ed25519 signature over the canonical attestation bytes binding
  // `recovery_attempt_id` (replay-bound to this attempt).
  bytes signature = 2;
}

// argon2id hash of the user-typed mnemonic, computed client-side over the
// stored salt + params. The server compares against the stored verifier in
// constant time. The plaintext mnemonic is NEVER sent. weft#186.
message PaperCodeRecoveryProof {
  // argon2id(typed_mnemonic, stored_salt, stored_params). Raw hash bytes.
  bytes argon2id_hash = 1;
  // The fresh device pubkey the recovered identity will be bound to. Raw
  // Ed25519 bytes.
  bytes new_device_public_key = 2;
}

message SubmitRecoveryProofResponse {
  // True once the proof is accepted and the attempt is awaiting either the
  // window elapse or a veto. CompleteRecovery becomes callable only after
  // both `proof_accepted` is true and the window has elapsed.
  bool proof_accepted = 1;
  // Echoed window deadline so the client can poll/schedule CompleteRecovery.
  google.protobuf.Timestamp completes_at = 2;
}

// Cancel an in-flight recovery attempt from an existing device. weft#183.
message VetoRecoveryRequest {
  string recovery_attempt_id = 1;
  // The veto bearer token surfaced to the user's existing devices by
  // BeginRecovery. Authorizes the cancel; valid only within the window.
  string veto_token = 2;
  string client_operation_id = 3;
}

message VetoRecoveryResponse {
  bool vetoed = 1;
}

// Complete a recovery attempt after the window has elapsed without a veto.
// Runs the credential-revocation cascade and returns an AccessToken bound to
// the new device key from the accepted proof. weft#183 §8-3.
message CompleteRecoveryRequest {
  string recovery_attempt_id = 1;
  string client_operation_id = 2;
}

// ── Handle directory and native-name escrow ────────────────────────────────

// Availability of a native handle after normalization and classification.
// RESERVED represents an explicit policy reservation; implementations MUST NOT
// infer it merely because a name is otherwise unavailable.
enum HandleAvailability {
  // No usable classification was produced. The caller may retry the safe
  // GetHandleStatus read; it MUST NOT infer that a mutation is allowed.
  HANDLE_AVAILABILITY_UNSPECIFIED = 0;
  // No other-owner hold, active native handle, or confusable collision blocks
  // this caller. `held_for_verified_owner = false` means a genuinely free name:
  // a new account claims it through BeginWebAuthnRegistration followed by
  // RegisterPublicKey. `held_for_verified_owner = true` means the caller may
  // own the nonblocking verified-owner hold; ClaimHandle is the authoritative
  // self-claim check.
  HANDLE_AVAILABILITY_AVAILABLE = 1;
  // A verified-owner hold for another subject blocks this caller. The only
  // mutation offered to the caller is RequestHeldName, which starts the
  // right-of-first-refusal window without exposing the owner.
  HANDLE_AVAILABILITY_HELD = 2;
  // An active native handle already owns this name. ResolveHandle can read the
  // public subject-free projection; no claim or escrow mutation is available.
  HANDLE_AVAILABILITY_TAKEN = 3;
  // Explicit policy reservation. No handle mutation is available for this
  // candidate; choose another candidate and call GetHandleStatus again.
  HANDLE_AVAILABILITY_RESERVED = 4;
  // The candidate conflicts with a trust-bearing handle under the confusable
  // classifier, so no free-name registration mutation is available; choose
  // another candidate and call GetHandleStatus again. ClaimHandle remains only
  // for a previously earned caller-owned verified-owner hold and is the
  // authoritative check for that hidden ownership fact.
  HANDLE_AVAILABILITY_CONFUSABLE = 5;
}

message GetHandleStatusRequest {
  string name = 1;
}

message GetHandleStatusResponse {
  HandleAvailability availability = 1;
  // True whenever the normalized name has an active verified-owner hold. A
  // blocking other-owner hold reports HELD; a nonblocking caller-owned hold
  // reports AVAILABLE, but ClaimHandle remains the authoritative ownership
  // check. The response MUST NOT expose the holder subject.
  bool held_for_verified_owner = 2;
}

message RequestHeldNameRequest {
  string name = 1;
  // Stable retry key in the namespace of the authenticated subject and this
  // RPC. A retry with the same authenticated subject, RPC, and client_operation_id
  // and normalized name returns the same response without repeating the mutation.
  // Key reuse with a different normalized name MUST fail with FAILED_PRECONDITION.
  string client_operation_id = 2;
}

message RequestHeldNameResponse {
  // Deadline of the right-of-first-refusal window. The current implementation
  // creates a 30-day window.
  google.protobuf.Timestamp rfr_deadline = 1;
}

message ClaimHandleRequest {
  string name = 1;
  // Stable retry key in the namespace of the authenticated subject and this
  // RPC. A retry with the same authenticated subject, RPC, and client_operation_id
  // and normalized name returns the same response without repeating the mutation.
  // Key reuse with a different normalized name MUST fail with FAILED_PRECONDITION.
  string client_operation_id = 2;
}

message ClaimHandleResponse {
  bool claimed = 1;
  // Canonical textual form of the claimed native handle.
  string canonical_handle = 2;
}

message ResolveHandleRequest {
  // Canonical handle text, a bare native name, or the legacy subject-route
  // form, for example `gh:torvalds`, `torvalds`, or `/u:user:<uuid>`.
  // Implementations MUST preserve `/u:<subject>` request lookup compatibility;
  // the response remains the subject-free HandlePrincipal projection.
  string name = 1;
}

// Subject-free handle-directory projection. ResolveHandle requires a valid
// bearer, but there is deliberately no subject field: resolving a name MUST NOT
// expose an underlying subject. `primary_handle` is the canonical URL/display
// token for the active principal.
message HandlePrincipal {
  // Legacy ResolvedPrincipal.subject occupied tag 1. Reserving both its tag and
  // name prevents legacy response bytes from decoding into any public field.
  reserved 1;
  reserved "subject";
  string display_name = 2;
  string handle = 3;
  bool resolved = 4;
  string primary_handle = 5;
  string kind = 6;
  bool verified = 7;
  string discriminator = 8;
}

message ResolveHandleResponse {
  // Populated for an active name. Absent for a tombstoned name.
  optional HandlePrincipal principal = 1;
  // True when the name existed but was renamed away. Never-claimed names
  // return NOT_FOUND instead of this response.
  bool tombstoned = 2;
}

service IdentityService {
  option (heddle.api.v1alpha1.service_contract) = {
    deployment_targets: DEPLOYMENT_TARGET_WEFT
