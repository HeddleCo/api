message ReviseContextRequest {
  RepositoryRef repo_path = 1;
  string annotation_id = 2;
  string content = 3;
  repeated string tags = 4;
  string agent_provider = 5;
  string agent_model = 6;
  ContextAnnotationKind kind = 7;
  string client_operation_id = 8;
}

message ReviseContextResponse {
  // Newly-captured ChangeId carrying the revision.
  bytes state = 1;
  uint32 revisions = 2;
}

message SupersedeContextRequest {
  RepositoryRef repo_path = 1;
  string annotation_id = 2;
  string path = 3;
  AnnotationScope scope = 4;
  repeated string tags = 5;
  string content = 6;
  string agent_provider = 7;
  string agent_model = 8;
  optional StateId target_state_id = 9;
  ContextAnnotationKind kind = 10;
