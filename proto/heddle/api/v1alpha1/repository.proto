message ContextSummary {
  uint32 total_annotations = 1;
  uint32 file_count = 2;
  uint32 stale_count = 3;
  uint32 invariant_count = 4;
  uint32 rationale_count = 5;
  uint32 constraint_count = 6;
  uint32 state_guidance_count = 7;
  uint32 superseded_count = 8;
