enum ProvenanceFileStatus {
  PROVENANCE_FILE_STATUS_UNSPECIFIED = 0;
  PROVENANCE_FILE_STATUS_AVAILABLE = 1;
  PROVENANCE_FILE_STATUS_PROVENANCE_ABSENT = 2;
  PROVENANCE_FILE_STATUS_BINARY = 3;
  PROVENANCE_FILE_STATUS_FILE_NOT_FOUND = 4;
  PROVENANCE_FILE_STATUS_ERROR = 5;
  PROVENANCE_FILE_STATUS_PENDING = 6;
}

enum DerivedSummaryBatchStatus {
  DERIVED_SUMMARY_BATCH_STATUS_UNSPECIFIED = 0;
  DERIVED_SUMMARY_BATCH_STATUS_READY = 1;
  DERIVED_SUMMARY_BATCH_STATUS_PENDING = 2;
  DERIVED_SUMMARY_BATCH_STATUS_RUNNING = 3;
  DERIVED_SUMMARY_BATCH_STATUS_FAILED = 4;
}

message ProvenanceFileSummary {
  string path = 1;
  ProvenanceFileStatus status = 2;
  optional BlameSummary summary = 3;
  uint32 authored_line_count = 4;
}

message ListProvenanceSummariesResponse {
  StateId state_id = 1;
