syntax = "proto3";

package heddle.api.v1alpha1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "heddle/api/v1alpha1/contract.proto";
import "heddle/api/v1alpha1/registry.proto";
import "heddle/api/v1alpha1/types.proto";

message GetRefsRequest {
  RepositoryRef repo_path = 1;
}

message MarkerInfo {
  string name = 1;
  StateId state_id = 2;
  // When the ref row last moved — NOT the tag's authored date (annotated-tag
  // metadata needs tag-object support; deliberately deferred).
  google.protobuf.Timestamp updated_at = 3;
}

message GetRefsResponse {
  string head = 1;
  repeated RefEntry threads = 2;
  repeated MarkerInfo markers = 3;
}

message ListStatesRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  uint32 limit = 3;
  // +weft#469: server-side filter to non-published statuses. Empty = no
  // filter (all statuses returned).
  repeated StateStatus status_filter = 4;
}

message GetStateRequest {
  RepositoryRef repo_path = 1;
  string id = 2;
}

message GetBlameRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  string path = 3;
}

message ListProvenanceSummariesRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  repeated string paths = 3;
}

message GetTreeRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  string path = 3;
}

// Closed set matching git's tree object model, plus the native SPOOLLINK edge
// (unlike deliberately-open string kinds elsewhere, e.g. Bookmark.resource_kind).
enum TreeEntryKind {
  TREE_ENTRY_KIND_UNSPECIFIED = 0;
  TREE_ENTRY_KIND_TREE = 1;
  TREE_ENTRY_KIND_BLOB = 2;
  // Symlink target path is stored as blob content; the link is not followed.
  TREE_ENTRY_KIND_SYMLINK = 3;
  // Submodule pointer (git submodule commit OID).
  TREE_ENTRY_KIND_GITLINK = 4;
  // Native child-spool edge. The entry's pointer is a spool-id + anchored
  // state-id (both 16-byte ChangeIds), NOT a git commit OID: the link is not
  // a git submodule and cannot round-trip to a 160000 tree entry on
  // git-export. Only native spool operations produce this kind (Spool epic,
  // weft#358).
  TREE_ENTRY_KIND_SPOOLLINK = 5;
}

message TreeEntry {
  string name = 1;
  TreeEntryKind kind = 2;
  bytes hash = 3;
}

message TreeResponse {
  StateId state_id = 1;
  string path = 2;
  repeated TreeEntry entries = 3;
}

message GetBlobRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  string path = 3;
}

message GetCompareRequest {
  RepositoryRef repo_path = 1;
  string from = 2;
  string to = 3;
  bool include_semantic = 4;
}

message BlobResponse {
  string path = 1;
  StateId state_id = 2;
  uint64 size = 3;
  bool is_binary = 4;
  string content = 5;
  // Leaf kinds only (BLOB / SYMLINK / GITLINK). SYMLINK content is the target-
  // path bytes; the link is NOT followed (heddle#850 semantics).
  TreeEntryKind kind = 6;
}

message DiffSpan {
  uint32 start = 1; // byte offset into content
  uint32 end = 2; // byte offset (exclusive)
  bool changed = 3; // true = this span was added/removed
}

message DiffLine {
  string kind = 1;
  string content = 2;
  repeated DiffSpan word_changes = 3;
  optional string moved_counterpart_path = 4;
  optional uint32 moved_counterpart_line = 5;
}

message DiffHunk {
  uint32 old_start = 1;
  uint32 old_lines = 2;
  uint32 new_start = 3;
  uint32 new_lines = 4;
  repeated DiffLine lines = 5;
}

message FileDiff {
  string path = 1;
  string kind = 2;
  repeated DiffHunk hunks = 3;
  // Semantic classification of the modification (e.g. "Logic", "FormattingOnly", "ImportsOnly").
  string classification = 4;
  // Review importance (e.g. "High", "Medium", "Low", "Noise").
  string importance = 5;
}

message DiffResponse {
  StateId state_id = 1;
  bytes parent_id = 2;
  bool has_parent = 3;
  repeated FileDiff files = 4;
}

message CompareSummary {
  uint32 added = 1;
  uint32 modified = 2;
  uint32 deleted = 3;
  uint32 renamed = 4;
  uint32 total = 5;
}

message CompareResponse {
  StateId from_state_id = 1;
  StateId to_state_id = 2;
  repeated FileDiff files = 3;
  repeated string semantic_changes_json = 4;
  CompareSummary summary = 5;
}

// Hot-spot aggregation: walk first-parent history starting from
// `from_state` (or HEAD), aggregate semantic-change events across the
// last `limit_states` pairs, and rank by event count. Pairs with the
// CLI's `heddle semantic hot` and the semantic crate's
// `analyze_hot_spots` function — same primitives, no per-host glue.
message GetSemanticHotSpotsRequest {
  RepositoryRef repo_path = 1;
  // State to start the walk from. Empty = HEAD.
  string from_state = 2;
  // Walk at most this many state pairs. Default 200.
  uint32 limit_states = 3;
  // What to bucket on. "file" or "function" (case-insensitive).
  // Default "file".
  string group_by = 4;
  // Restrict to events of these kinds (e.g. "signature_changed",
  // "function_extracted"). Empty list = no filter. Spelling matches
  // the kebab-case clap value-enum names from the CLI.
  repeated string include_kinds = 5;
  // Substring path filters. A path matches `include_paths` if any
  // entry is a substring of the path; matches `exclude_paths` likewise.
  repeated string include_paths = 6;
  repeated string exclude_paths = 7;
  // Number of slots to return at the top. Default 20.
  uint32 top_n = 8;
  // If true, populate per-actor histograms on each spot.
  bool include_actors = 9;
}

message GetSemanticHotSpotsResponse {
  repeated SemanticHotSpot spots = 1;
  uint32 states_walked = 2;
  uint32 total_events = 3;
}

message SemanticHotSpot {
  // "file" or "function".
  string key_kind = 1;
  string path = 2;
  // Empty unless `key_kind == "function"`.
  string function = 3;
  uint32 event_count = 4;
  uint32 state_count = 5;
  string first_seen = 6;
  string last_seen = 7;
  // Histogram of event kinds (e.g. {"signature_changed": 3,
  // "function_extracted": 2}). Sums to `event_count`.
  map<string, uint32> by_kind = 8;
  // Histogram of actors (e.g. {"alice <a@x>": 4}). Empty unless the
  // request set `include_actors = true`.
  map<string, uint32> by_actor = 9;
}

message ActionSummary {
  string id = 1;
  optional string from_state = 2;
  string to_state = 3;
  string operation_json = 4;
  string description = 5;
  repeated string semantic_changes_json = 6;
  string timestamp = 7;
}

message ActionsResponse {
  repeated ActionSummary actions = 1;
}

message StatePrincipal {
  string name = 1;
  string email = 2;
}

message StateAgent {
  string provider = 1;
  string model = 2;
}

message StateVerification {
  uint32 tests_passed = 1;
  uint32 tests_failed = 2;
  optional float coverage_pct = 3;
  optional float coverage_delta = 4;
  uint32 lint_warnings = 5;
}

message StateSummary {
  StateId state_id = 1;
  repeated bytes parents = 2;
  string intent = 3;
  google.protobuf.Timestamp created_at = 4;
  StatePrincipal principal = 5;
  optional StateAgent agent = 6;
  optional float confidence = 7;
  StateStatus status = 8;
  optional StateVerification verification = 9;
  ChangeId change_id = 10;
}

message ListStatesResponse {
  repeated StateSummary states = 1;
}

message BlameOrigin {
  StateId state_id = 1;
  string author = 2;
  string timestamp = 3;
  string principal_name = 4;
  string principal_email = 5;
  string agent_provider = 6;
  string agent_model = 7;
}

message BlameLine {
  uint32 line_number = 1;
  string content = 2;
  StateId state_id = 3;
  string author = 4;
  string timestamp = 5;
  repeated BlameOrigin origins = 6;
  bool carried = 7;
}

message BlameSummary {
  uint32 total_lines = 1;
  uint32 distinct_origin_count = 2;
  uint32 multi_origin_line_count = 3;
  uint32 carried_line_count = 4;
}

message GetBlameResponse {
  string path = 1;
  StateId state_id = 2;
  bool has_provenance = 3;
