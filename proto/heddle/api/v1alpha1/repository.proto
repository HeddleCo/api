// ── Context / Annotation messages ────────────────────────

enum StalenessStatus {
  STALENESS_UNKNOWN = 0;
  STALENESS_FRESH = 1;
  STALENESS_SOURCE_CHANGED = 2;
  STALENESS_SYMBOL_MISSING = 3;
}

message SymbolScope {
  string name = 1;
  optional uint32 resolved_start = 2;
  optional uint32 resolved_end = 3;
}

message LineRange {
  uint32 start = 1;
  uint32 end = 2;
}

message AnnotationScope {
  oneof scope {
    bool file = 1;
    SymbolScope symbol = 2;
    LineRange lines = 3;
  }
}

message ContextAnnotation {
  string id = 1;
  AnnotationScope scope = 2;
  string content = 3;
  repeated string tags = 4;
  string attribution = 5;
  google.protobuf.Timestamp created_at = 6;
  optional bytes source_hash = 7;
  optional string created_at_state = 8;
  StalenessStatus staleness = 9;
  ContextAnnotationStatus status = 10;
  ContextAnnotationKind kind = 11;
  uint32 revision_count = 12;
  optional string supersedes_annotation_id = 13;
  optional uint32 supersedes_rewrite_pct = 14;
}

message AnnotatedFile {
  string path = 1;
  repeated ContextAnnotation annotations = 2;
}

message StateContextEntry {
  StateId state_id = 1;
  repeated ContextAnnotation annotations = 2;
}

message ListContextRequest {
  RepositoryRef repo_path = 1;
  string ref = 2;
  optional string prefix = 3;
  optional string tag_filter = 4;
}

message ListContextResponse {
  repeated AnnotatedFile files = 1;
  ContextSummary summary = 2;
  repeated StateContextEntry states = 3;
}

message ContextRevision {
  string revision_id = 1;
  ContextAnnotationKind kind = 2;
  string content = 3;
  repeated string tags = 4;
  string attribution = 5;
  google.protobuf.Timestamp created_at = 6;
  optional bytes source_hash = 7;
  optional string created_at_state = 8;
}

message GetContextHistoryRequest {
