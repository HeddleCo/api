syntax = "proto3";

package heddle.api.v1alpha1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "heddle/api/v1alpha1/contract.proto";
import "heddle/api/v1alpha1/types.proto";

// =====================================================================
// Foundation services for the Review and Agent-First CLI epics.
// =====================================================================

// State review surface. Distinct from the GitHub-PR-focused ReviewService
// above. Ships the review payload that powers both the CLI's
// `heddle review show` and the web's state-review route.

// Reviewer verdict (weft#481). Opinion-only — orthogonal to `StateStatus`.
// A HOLD/REJECT never changes task fate; `RecordVerdict` returns the SAME
// state_id. Legacy positive signatures decode as UNSPECIFIED (treat as SIGN).
enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  VERDICT_SIGN = 1; // positive (also reachable via existing SignState)
  VERDICT_HOLD = 2; // "iterate on this change" — non-terminal opinion
  VERDICT_REJECT = 3; // "this attempt declined; rethink the approach" — NOT abort, no status change
}

// Kind of review-progress check (weft#482).
enum CheckKind {
  CHECK_KIND_UNSPECIFIED = 0;
  CHECK_KIND_FILE_REVIEWED = 1; // per-file checkmark; check_ref = file path
  CHECK_KIND_RISK_SIGNAL_ACK = 2; // per-risk-signal ack; check_ref = signal id
}

message GetReviewPayloadRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
  // When true, the response includes `all_signals` populated.
  bool include_all_signals = 3;
}

message ReviewPayload {
  StateId state_id = 1;
  ReviewSummary summary = 2;
  // Agent-authored narrative captured at snapshot time. Empty when
  // the state has no agent attribution.
  string agent_narrative = 3;
  ReadingOrderPartition partition = 4;
  repeated RiskSignal in_budget_signals = 5;
  // Full set of fired signals; only populated when the request set
  // `include_all_signals = true`.
  repeated RiskSignal all_signals = 6;
  uint32 tick_budget = 7;
  repeated AnchoredDiscussion discussions = 8;
  repeated MergeRequirement merge_requirements = 9;
  SigningFooter signing_footer = 10;
}

message ReviewSummary {
  string headline = 1;
  uint32 files_changed = 2;
  uint32 added_lines = 3;
  uint32 removed_lines = 4;
  uint32 in_budget_signal_count = 5;
  uint32 hidden_signal_count = 6;
}

message ReadingOrderPartition {
  repeated PathSymbolRef structural = 1;
  repeated PathSymbolRef consequence = 2;
  repeated PathSymbolRef tests_and_docs = 3;
}

message PathSymbolRef {
  string file = 1;
  string symbol = 2;
}

message RiskSignal {
  // Snake-case wire vocabulary matching `objects::object::RiskSignalKind`.
  string kind = 1;
  SignalAnchor anchor = 2;
  string reason = 3;
  string producer_module = 4;
  uint32 producer_version = 5;
  google.protobuf.Timestamp computed_at = 6;
  // Render-time tier — `visible` or `hidden`. Set by the server-side
  // budgeter so clients render without re-budgeting.
  string visibility = 7;
}

message SignalAnchor {
  string file = 1;
  string symbol = 2;
  // Empty when the signal is file-level rather than symbol-level.
  uint32 start_line = 3;
  uint32 end_line = 4;
}

message AnchoredDiscussion {
  string id = 1;
  PathSymbolRef anchor = 2;
  StateId opened_against_state = 3;
  google.protobuf.Timestamp opened_at = 4;
  repeated DiscussionTurn turns = 5;
  DiscussionResolution resolution = 6;
  bool body_changed_since_open = 7;
  bool orphaned = 8;
  string visibility = 9;
}

message DiscussionTurn {
  string author_name = 1;
  string author_email = 2;
  string body = 3;
  google.protobuf.Timestamp posted_at = 4;
}

// Resolution state of a discussion. `Open` means unresolved; the
// other three variants carry the artifact that closed it. Discussions
// progress strictly Open → resolved/dismissed; the oneof guarantees
// exactly one shape on the wire.
message DiscussionResolution {
  oneof state {
    Open open = 1;
    ResolvedIntoAnnotation into_annotation = 2;
    ResolvedByEdit by_edit = 3;
    Dismissed dismissed = 4;
  }

  message Open {}
  message ResolvedIntoAnnotation {
    string annotation_id = 1;
  }
  message ResolvedByEdit {
    StateId state_id = 1;
  }
  message Dismissed {
    string reason = 1;
  }
}

message MergeRequirement {
  string description = 1;
  bool satisfied = 2;
}

message SigningFooter {
  // Permitted review kinds for this state — server filters out kinds
  // that don't apply (e.g. AGENT_CO_REVIEW hidden when caller isn't
  // an agent).
  repeated ReviewKind available_kinds = 1;
}

message SignStateRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
  ReviewKind kind = 3;
  ReviewScope scope = 4;
  string justification = 5;
  string algorithm = 6;
  bytes public_key = 7;
  // Raw signature bytes over the canonical signing payload.
  bytes signature = 8;
  // Unix timestamp (seconds) the client signed at. The server rejects values
  // skewed more than `SIGN_TIMESTAMP_SKEW_SECS` from its own clock so the
  // signature can be reproduced and verified deterministically.
  google.protobuf.Timestamp signed_at = 9;
  string client_operation_id = 10;
}

// Scope of a review signature — either the whole change or a list of
// individual symbols. The oneof guarantees exactly one shape on the
// wire.
message ReviewScope {
  oneof scope {
    WholeChange whole_change = 1;
    SymbolList symbols = 2;
  }
  message WholeChange {}
  message SymbolList {
    repeated PathSymbolRef symbols = 1;
  }
}

message SignStateResponse {
  string signature_id = 1;
  StateId state_id = 2;
}

message ListSignaturesRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
}

message ListSignaturesResponse {
  repeated ReviewSignature signatures = 1;
}

message ReviewSignature {
  string signature_id = 1;
  string actor_name = 2;
  string actor_email = 3;
  ReviewKind kind = 4;
  ReviewScope scope = 5;
  string justification = 6;
  google.protobuf.Timestamp signed_at = 7;
  string algorithm = 8;
  bytes public_key = 9;
  bytes signature = 10;
  // +weft#481: surfaces a recorded verdict through the existing ListSignatures
  // path. UNSPECIFIED/SIGN for legacy positive sigs; HOLD/REJECT for verdicts.
  Verdict verdict = 11;
  // +weft#481: the required decline reason (empty for positive signatures).
  string reason = 12;
}

// +weft#481: record a signed reviewer verdict. Mirrors the SignStateRequest
// signing model (canonical payload, algorithm, public_key, signature,
// signed_at). DECOUPLED from status.
message RecordVerdictRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
  Verdict verdict = 3;
  ReviewScope scope = 4;
  // REQUIRED for HOLD/REJECT (server-validated non-empty).
  string reason = 5;
  string algorithm = 6;
  bytes public_key = 7;
  // Raw signature bytes over the v2 canonical signing payload (incl. verdict).
  bytes signature = 8;
  google.protobuf.Timestamp signed_at = 9;
  string client_operation_id = 10;
}

message RecordVerdictResponse {
  // The appended attestation's id.
  string signature_id = 1;
  // Unchanged — the SAME state. A verdict never mints a successor, moves the
  // tip, or changes status (decoupling). No status field by design.
  StateId state_id = 2;
}

// +weft#482: a signed review-progress ack, keyed by
// (state_id, actor, check_kind, check_ref). Acks are auditable attestations
// (mirror the SignState signing fields).
message ReviewCheckAck {
  string actor_name = 1;
  string actor_email = 2;
  CheckKind check_kind = 3;
  // The file path (FILE_REVIEWED) or risk-signal id (RISK_SIGNAL_ACK).
  string check_ref = 4;
  bool acked = 5;
  google.protobuf.Timestamp acked_at = 6;
  string algorithm = 7;
  bytes public_key = 8;
  bytes signature = 9;
}

message RecordCheckAckRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
  CheckKind check_kind = 3;
  string check_ref = 4;
  bool acked = 5;
  string algorithm = 6;
  bytes public_key = 7;
  bytes signature = 8;
  google.protobuf.Timestamp acked_at = 9;
  string client_operation_id = 10;
}

message RecordCheckAckResponse {
  ReviewCheckAck ack = 1;
}

message GetReviewProgressRequest {
  RepositoryRef repo_path = 1;
  StateId state_id = 2;
  // Optional: restrict to a single reviewer's acks. Empty = all users.
  string actor_name = 3;
  // Pagination (table-backed).
  uint32 limit = 4;
  // Opaque cursor (row id).
  string page_token = 5;
}

message GetReviewProgressResponse {
  repeated ReviewCheckAck acks = 1;
  string next_page_token = 2;
}

// Repo-level signal health (ported from legacy SignalService.GetRepoSignalHealth).
// Powers the CLI `heddle review health` rolling-window fire-rate report.
message GetRepoSignalHealthRequest {
  RepositoryRef repo_path = 1;
  // Number of recent states to include in the rolling window. Server applies a
  // sane default when zero.
  uint32 window_states = 2;
}

message RepoSignalHealthReport {
  repeated SignalHealthEntry entries = 1;
  uint32 window_states = 2;
}

message SignalHealthEntry {
  string module_id = 1;
  float fire_rate = 2;
  bool warn = 3;
}

service StateReviewService {
  option (heddle.api.v1alpha1.service_contract) = {
    deployment_targets: DEPLOYMENT_TARGET_WEFT
    deployment_targets: DEPLOYMENT_TARGET_HEDDLE_DAEMON
    maturity: SERVICE_MATURITY_SHIPPED
  };
  rpc GetRepoSignalHealth(GetRepoSignalHealthRequest) returns (RepoSignalHealthReport) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_NONE
      effect: RPC_EFFECT_READ_ONLY
      retry_behavior: RETRY_BEHAVIOR_SAFE
      client_operation_id_required: false
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_READER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_READER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  rpc GetReviewPayload(GetReviewPayloadRequest) returns (ReviewPayload) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_NONE
      effect: RPC_EFFECT_READ_ONLY
      retry_behavior: RETRY_BEHAVIOR_SAFE
      client_operation_id_required: false
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_READER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_READER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  rpc GetReviewProgress(GetReviewProgressRequest) returns (GetReviewProgressResponse) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_NONE
      effect: RPC_EFFECT_READ_ONLY
      retry_behavior: RETRY_BEHAVIOR_SAFE
      client_operation_id_required: false
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_READER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_READER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  rpc ListSignatures(ListSignaturesRequest) returns (ListSignaturesResponse) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_NONE
      effect: RPC_EFFECT_READ_ONLY
      retry_behavior: RETRY_BEHAVIOR_SAFE
      client_operation_id_required: false
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_READER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_READER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  // Record a signed per-file / per-risk-signal review-progress ack. Repo Write
  // parity — an ack is durable review evidence.
  rpc RecordCheckAck(RecordCheckAckRequest) returns (RecordCheckAckResponse) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_PROOF_OF_POSSESSION
      effect: RPC_EFFECT_DURABLE_WRITE
      retry_behavior: RETRY_BEHAVIOR_CLIENT_OPERATION_ID
      client_operation_id_required: true
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  // Record a signed SIGN/HOLD/REJECT reviewer verdict. DECOUPLED from status —
  // returns the SAME state, never mints a successor. Repo Write parity (same
  // gate as a positive SignState).
  rpc RecordVerdict(RecordVerdictRequest) returns (RecordVerdictResponse) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_PROOF_OF_POSSESSION
      effect: RPC_EFFECT_DURABLE_WRITE
      retry_behavior: RETRY_BEHAVIOR_CLIENT_OPERATION_ID
      client_operation_id_required: true
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
  rpc SignState(SignStateRequest) returns (SignStateResponse) {
    option (heddle.api.v1alpha1.rpc_contract) = {
      signing_identity: STABLE_SIGNING_IDENTITY_AUTHENTICATED_PRINCIPAL
      signing_tier: SIGNING_TIER_PROOF_OF_POSSESSION
      effect: RPC_EFFECT_DURABLE_WRITE
      retry_behavior: RETRY_BEHAVIOR_CLIENT_OPERATION_ID
      client_operation_id_required: true
      capability: CAPABILITY_AREA_REVIEW_DECISIONS
      authorization_access: AUTHORIZATION_ACCESS_AUTHENTICATED_PRINCIPAL
      authorization_role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      authorization_scope_source: AUTHORIZATION_SCOPE_SOURCE_REQUEST_REPOSITORY
      authorization_request_targets: {
        path: "repo_path"
        role: AUTHORIZATION_ROLE_RESOURCE_WRITER
      }
      authorization_existence: AUTHORIZATION_EXISTENCE_HIDE
    };
  }
}
