syntax = "proto3";

package heddle.api.v1alpha1;

message RefEntry {
  string name = 1;
  StateId state_id = 2;
  bool is_thread = 3;
  // Explicit revision address for two-lane storage. Native refs use
  // `heddle:<state_id>`; Git-overlay refs use `git:<commit_oid>`.
  string revision_address = 4;
}

// Five-level role grants on hosted namespaces and repositories. Used
// wherever a role appears on the wire — `HostedGrant.role`,
// `Invitation.role`, `ApprovalGroupMember.required_role`,
// `ThreadPolicy.required_role`, etc.
enum HostedRole {
  HOSTED_ROLE_UNSPECIFIED = 0;
  HOSTED_ROLE_READER = 1;
  HOSTED_ROLE_DEVELOPER = 2;
  HOSTED_ROLE_MAINTAINER = 3;
  HOSTED_ROLE_ADMIN = 4;
  HOSTED_ROLE_OWNER = 5;
}

// Review-signature kinds. `READ` is a human reviewer; the agent variants
// distinguish what an AI signing a state was actually doing — preview
// (passive read-through) vs co-review (mutating suggestions).
enum ReviewKind {
  REVIEW_KIND_UNSPECIFIED = 0;
  REVIEW_KIND_READ = 1;
  REVIEW_KIND_AGENT_PREVIEW = 2;
  REVIEW_KIND_AGENT_CO_REVIEW = 3;
}

// State publication status. Captures whether a state is in-progress
// (`DRAFT`) or pinned as the published shape of the work (`PUBLISHED`).
// The failure/terminal statuses (`ABANDONED`/`ABORTED`/`SUPERSEDED`) are
// author/gate-driven (weft#469) and orthogonal to reviewer verdicts —
// `RecordVerdict` never sets them. `FAILED` is intentionally absent: it is
// derivable from `verification.tests_failed > 0`.
enum StateStatus {
  STATE_STATUS_UNSPECIFIED = 0;
  STATE_STATUS_DRAFT = 1;
  STATE_STATUS_PUBLISHED = 2;
  STATE_STATUS_ABANDONED = 3; // +weft#469: author gave up on the task
  STATE_STATUS_ABORTED = 4; // +weft#469: hard merge-gate/policy killed it
  STATE_STATUS_SUPERSEDED = 5; // +weft#469: replaced by a successor attempt
}

// Grants are scoped to either a namespace or a repository — never both,
// never neither. The `target` oneof is the wire-level form of that
// "exactly one of" guarantee. Server-side `classify_grant_target` converts
// the populated arm to the canonical `GrantTarget` value and rejects an
// unset target.
message GrantTargetRef {
  oneof target {
    string namespace_path = 1;
    RepositoryRef repo_path = 2;
  }
}

message DeleteResponse {
  bool deleted = 1;
}

message UsageSummary {
  optional uint64 input_tokens = 1;
  optional uint64 output_tokens = 2;
  optional uint64 reasoning_tokens = 3;
  optional uint64 tool_calls = 4;
  optional uint64 cost_micros_usd = 5;
}

message StateId {
  bytes value = 1;
}
message ChangeId {
  bytes value = 1;
}
message GitObjectId {
  GitObjectAlgorithm algorithm = 1;
  bytes digest = 2;
}
message RepositoryRef {
  oneof reference {
    string hosted_id = 1;
    string canonical_path = 2;
  }
}
message AgentRunId {
  string value = 1;
}
message TimelineOperationId {
  bytes value = 1;
}
message AgentCommandId {
  string value = 1;
}
message PermissionId {
  string value = 1;
}
// Opaque 16-byte durable operation identity.
message OperationId {
  bytes value = 1;
}
// Opaque 16-byte identity for an atomically submitted operation batch.
message OperationBatchId {
  bytes value = 1;
}

enum GitObjectAlgorithm {
  GIT_OBJECT_ALGORITHM_UNSPECIFIED = 0;
  GIT_OBJECT_ALGORITHM_SHA1 = 1;
  GIT_OBJECT_ALGORITHM_SHA256 = 2;
}
enum AgentRunStatus {
  AGENT_RUN_STATUS_UNSPECIFIED = 0;
  AGENT_RUN_STATUS_RUNNING = 1;
  AGENT_RUN_STATUS_PAUSED = 2;
  AGENT_RUN_STATUS_COMPLETED = 3;
  AGENT_RUN_STATUS_FAILED = 4;
  AGENT_RUN_STATUS_CANCELLED = 5;
}
enum AgentVisibility {
  AGENT_VISIBILITY_UNSPECIFIED = 0;
  AGENT_VISIBILITY_OWNER_AND_MAINTAINERS = 1;
  AGENT_VISIBILITY_REPOSITORY_MEMBERS = 2;
  AGENT_VISIBILITY_ORGANIZATION = 3;
}
enum StructuredRetention {
  STRUCTURED_RETENTION_UNSPECIFIED = 0;
  STRUCTURED_RETENTION_30_DAYS = 1;
  STRUCTURED_RETENTION_90_DAYS = 2;
  STRUCTURED_RETENTION_365_DAYS = 3;
  STRUCTURED_RETENTION_UNTIL_REPOSITORY_DELETION = 4;
}
enum RawDiagnosticRetention {
  RAW_DIAGNOSTIC_RETENTION_UNSPECIFIED = 0;
  RAW_DIAGNOSTIC_RETENTION_OFF = 1;
  RAW_DIAGNOSTIC_RETENTION_1_DAY = 2;
  RAW_DIAGNOSTIC_RETENTION_7_DAYS = 3;
  RAW_DIAGNOSTIC_RETENTION_30_DAYS = 4;
}
enum AgentControlKind {
  AGENT_CONTROL_KIND_UNSPECIFIED = 0;
  AGENT_CONTROL_KIND_PAUSE_AT_SAFE_BOUNDARY = 1;
  AGENT_CONTROL_KIND_RESUME = 2;
  AGENT_CONTROL_KIND_CANCEL_BEST_EFFORT = 3;
  AGENT_CONTROL_KIND_STEER = 4;
}
enum AgentCommandStatus {
  AGENT_COMMAND_STATUS_UNSPECIFIED = 0;
  AGENT_COMMAND_STATUS_QUEUED = 1;
  AGENT_COMMAND_STATUS_DELIVERED = 2;
  AGENT_COMMAND_STATUS_ACKNOWLEDGED = 3;
  AGENT_COMMAND_STATUS_COMPLETED = 4;
  AGENT_COMMAND_STATUS_REJECTED = 5;
  AGENT_COMMAND_STATUS_EXPIRED = 6;
}
enum PermissionDecisionKind {
  PERMISSION_DECISION_KIND_UNSPECIFIED = 0;
  PERMISSION_DECISION_KIND_ALLOW_ONCE = 1;
  PERMISSION_DECISION_KIND_DENY_ONCE = 2;
  PERMISSION_DECISION_KIND_REMEMBER_ALLOW = 3;
  PERMISSION_DECISION_KIND_REMEMBER_DENY = 4;
}
